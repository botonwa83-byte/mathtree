<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学制高点</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #ff6b35, #7b2ff7); color: #fff; padding: 24px;
  }
  .card {
    background: rgba(255,255,255,.12); backdrop-filter: blur(12px);
    border-radius: 24px; padding: 40px 32px; max-width: 420px; width: 100%;
    text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  .logo { font-size: 46px; }
  h1 { font-size: 28px; font-weight: 800; margin: 12px 0 6px; }
  .slogan { opacity: .9; font-size: 15px; margin-bottom: 28px; }
  .links { display: flex; flex-direction: column; gap: 12px; }
  a {
    display: block; padding: 14px; border-radius: 14px; text-decoration: none;
    background: rgba(255,255,255,.2); color: #fff; font-weight: 600; font-size: 15px;
    transition: background .2s;
  }
  a:hover { background: rgba(255,255,255,.32); }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">⚡️</div>
    <h1>数学制高点</h1>
    <div class="slogan">降维秒杀 · 俯瞰高考压轴</div>
    <div class="links">
      <a href="privacy.html">隐私政策</a>
      <a href="terms.html">用户协议</a>
